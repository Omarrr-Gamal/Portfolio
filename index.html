    <body>
      <div id="root"></div>
      <script>
        // GitHub Pages SPA fallback:
        // `404.html` redirects deep links to `/<base>/?__spa=<originalPath>`.
        // Restore the path BEFORE the React app/router loads.
        (function () {
          var params = new URLSearchParams(window.location.search);
          var spa = params.get("__spa");
          if (!spa) return;
          params.delete("__spa");
          var rest = params.toString();
          var newUrl = window.location.pathname.replace(/\/$/, "") + spa + (rest ? "?" + rest : "");
          history.replaceState(null, "", newUrl);
        })();
      </script>
    </body>
